name: TT Engine

on:
  schedule:
    # Off-peak minutes: GitHub heavily throttles top-of-hour crons; :03/:33
    # fire far more reliably. Still best-effort — the Mac-side dispatcher
    # (install.sh) covers the gaps whenever the owner's machine is awake.
    - cron: "3,33 * * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "Force a full run (WTT crawl included)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: tt-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # aiscore's bot protection 403s plain-Python clients from some networks.
      # The engine retries those requests through headless Chromium.
      - name: Install browser-fetch fallback
        run: |
          python3 -m pip install --quiet playwright
          python3 -m playwright install --with-deps chromium

      # Politeness: the heavy WTT crawl (~170 requests) runs only on even
      # 2-hour marks; the other runs are quick amateur-circuit sweeps
      # (a handful of requests) so bet slots refill every 30 minutes.
      - name: Pick run mode
        id: mode
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            echo "quick=" >> "$GITHUB_OUTPUT"
          elif [ "$(( $(date -u +%-H) % 2 ))" = "0" ] && [ "$(date -u +%M)" -lt 20 ]; then
            echo "quick=" >> "$GITHUB_OUTPUT"
          else
            echo "quick=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run prediction engine
        env:
          TT_BROWSER_FETCH: "1"
          TT_QUICK: ${{ steps.mode.outputs.quick }}
        run: python3 engine.py

      - name: Post new wagers to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TT_TZ: America/New_York
        run: python3 notify_discord.py

      - name: Commit updated data
        run: |
          git config user.name "tt-engine"
          git config user.email "tt-engine@users.noreply.github.com"
          git add bets.js engine_log.txt
          git add elo.json .discord_posted.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "engine run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
