name: TT Engine (hourly)

on:
  schedule:
    - cron: "0 * * * *"   # every hour, on GitHub's servers — your Mac can be off
  workflow_dispatch: {}    # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: tt-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # aiscore's bot protection 403s plain-Python clients from some networks.
      # The engine retries those requests through headless Chromium.
      - name: Install browser-fetch fallback
        run: |
          python3 -m pip install --quiet playwright
          python3 -m playwright install --with-deps chromium

      - name: Run prediction engine
        env:
          TT_BROWSER_FETCH: "1"
        run: python3 engine.py

      - name: Commit updated data
        run: |
          git config user.name "tt-engine"
          git config user.email "tt-engine@users.noreply.github.com"
          git add bets.js engine_log.txt
          git add elo.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "engine run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
